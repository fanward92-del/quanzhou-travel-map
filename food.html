<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>泉州美食点位地图</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4ef;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #687385;
      --line: #ddd6cb;
      --accent: #0f766e;
      --shadow: 0 14px 34px rgba(52, 47, 39, .16);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(340px, 430px) minmax(0, 1fr);
      height: 100dvh;
    }

    aside {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 500;
    }

    header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 14px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: #fbf7ee;
    }

    .stat b {
      display: block;
      font-size: 18px;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .controls {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
    }

    .search {
      width: 100%;
      height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 0 12px;
      font: inherit;
      background: white;
      color: var(--ink);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 10px;
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      background: white;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      line-height: 1;
    }

    button.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .list {
      min-height: 0;
      overflow: auto;
      padding: 12px 14px 18px;
    }

    .item {
      display: grid;
      grid-template-columns: 12px 1fr;
      gap: 10px;
      padding: 12px 8px;
      border-bottom: 1px solid #ece5d8;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 7px;
      border: 2px solid white;
      box-shadow: 0 0 0 1px rgba(0,0,0,.12);
    }

    .item h2 {
      margin: 0;
      font-size: 15px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .meta {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .note {
      margin-top: 6px;
      font-size: 13px;
      line-height: 1.45;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      font-size: 12px;
    }

    a {
      color: #0f766e;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    #map {
      min-height: 100dvh;
      background: #e8e0d2;
    }

    .pin {
      width: 20px;
      height: 20px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0,0,0,.28);
    }

    .pin span {
      display: block;
      width: 6px;
      height: 6px;
      margin: 5px;
      border-radius: 50%;
      background: white;
    }

    .popup h3 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .popup p {
      margin: 5px 0;
      color: #4b5563;
      line-height: 1.45;
    }

    .legend {
      padding: 10px 12px;
      background: rgba(255,255,255,.95);
      border-radius: 8px;
      box-shadow: 0 6px 22px rgba(0,0,0,.16);
      font-size: 12px;
      line-height: 1.5;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .leaflet-control-attribution { font-size: 10px; }

    @media (max-width: 860px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 54dvh 46dvh;
      }

      aside {
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      #map {
        grid-row: 1;
        min-height: 54dvh;
      }

      header { padding: 14px 16px 10px; }
      h1 { font-size: 20px; }
      .stats { margin-top: 10px; }
      .controls { padding: 10px 14px; }
    }
  </style>
</head>

        <div class="stats">

      <section class="controls">

    <section id="map" aria-label="泉州美食地图"></section>
  </main>

      { name: "张耀伯菜粿", category: "石狮晋江", area: "晋江安海", address: "晋江市安海镇成功西路103号", lat: 24.7161, lng: 118.4638, precision: "街区级", priority: "远郊", note: "安海小吃线，可和土笋冻、菜粿合并。", source: "用户提供地址" },
      { name: "安海长火土笋冻", category: "石狮晋江", area: "晋江安海", address: "晋江市安海镇兴安C里2号", lat: 24.7146, lng: 118.4650, precision: "街区级", priority: "远郊", note: "安海土笋冻代表点。", source: "用户提供地址" },
      { name: "翁氏润饼菜", category: "石狮晋江", area: "晋江安海", address: "晋江市兴东西路与通海路交叉口东南60米", lat: 24.7194, lng: 118.4690, precision: "街区级", priority: "远郊", note: "安海/晋江润饼菜补充。", source: "用户提供地址" },

      { name: "马脚桥鱼肉羹", category: "石狮晋江", area: "石狮", address: "石狮市人民路83号", lat: 24.7341, lng: 118.6465, precision: "地址级", priority: "石狮顺路", note: "视频清单点位。", source: "用户提供地址" },
      { name: "福记蚵仔煎", category: "石狮晋江", area: "石狮八卦街", address: "石狮市大仑街8号/八卦街菜市场对面", lat: 24.7310, lng: 118.6460, precision: "街区级", priority: "石狮顺路", note: "有人反馈20元偏贵、海蛎不多；当作八卦街顺路尝。", source: "用户提供地址" },
      { name: "约记大仑街肉粽", category: "石狮晋江", area: "石狮八卦街", address: "石狮市大仑街25号", lat: 24.7313, lng: 118.6462, precision: "街区级", priority: "石狮顺路", note: "用户试吃反馈一般，保留为补充点。", source: "用户提供地址" },
      { name: "王川花生汤(中骏悦景府店)", category: "石狮晋江", area: "石狮", address: "石狮市聚祥路悦景府16-17号店铺", lat: 24.7256, lng: 118.6422, precision: "街区级", priority: "石狮顺路", note: "同甜品条目，石狮早餐线核心。", source: "携程核对" },
      { name: "港阜小番杂菜卤", category: "石狮晋江", area: "晋江深沪", address: "晋江市深沪镇港阜街东19号", lat: 24.6087, lng: 118.6724, precision: "街区级", priority: "远郊", note: "深沪线，离古城很远。", source: "用户提供地址" },
      { name: "深沪烽火台水丸店", category: "石狮晋江", area: "晋江深沪", address: "晋江市深沪镇佳源商业城一层", lat: 24.6106, lng: 118.6741, precision: "街区级", priority: "远郊", note: "深沪线可与拳头母鱼饼/水丸类一起。", source: "用户提供地址" },
      { name: "大井头正宗肉粽壶仔饭", category: "石狮晋江", area: "晋江", address: "晋江市狮峰中心学校东南门西南约100米", lat: 24.7350, lng: 118.5950, precision: "街区级", priority: "远郊", note: "视频清单点位，坐标为学校附近约略。", source: "用户提供地址" },
      { name: "绿岛海鲜酒楼/绿岛酒店", category: "石狮晋江", area: "石狮", address: "石狮绿岛酒店或旧绿岛海鲜酒楼", lat: 24.7290, lng: 118.6540, precision: "街区级", priority: "石狮顺路", note: "用户提到松茸包、马加羹；具体分店出发前再确认。", source: "用户推荐" },

      { name: "庆有余(浦西央街店)", category: "海鲜正餐", area: "丰泽浦西", address: "泉州市丰泽区草埕花园10号楼", lat: 24.8875, lng: 118.5966, precision: "地址级", priority: "高预算", note: "海鲜正餐，用户提到冻花蟹、糖心皮皮虾；人均跨度大。", source: "米其林/Trip核对" },
      { name: "无牙海鲜馆", category: "海鲜正餐", area: "晋江仙石", address: "晋江市仙石村沙园路56号", lat: 24.7530, lng: 118.5860, precision: "街区级", priority: "远郊", note: "用户给出的海鲜馆备选。", source: "用户提供地址" },
      { name: "田大侠烧烤总店", category: "烧烤夜宵", area: "鲤城浮桥", address: "鲤城区江滨南路金色外滩2207-104号", lat: 24.8790, lng: 118.5650, precision: "街区级", priority: "夜宵", note: "炒钉螺被点名；适合晚上。", source: "用户提供地址" },
      { name: "铁霞烧烤/明英烧烤", category: "烧烤夜宵", area: "鲤城后城/水门一带", address: "后城/水门一带，具体门牌待确认", lat: 24.9038, lng: 118.5900, precision: "街区级", priority: "夜宵", note: "花生酱烧烤路线，用户提到明英、铁霞。", source: "用户推荐+视频线索" },
      { name: "美味烧烤", category: "烧烤夜宵", area: "待确认", address: "用户只提供店名和烤鳗鱼，未核到可靠地址", lat: null, lng: null, precision: "待确认", priority: "夜宵", note: "保留为待查。", source: "用户推荐" }
    ];

    const amapSearch = (point) => {
      const q = encodeURIComponent(`${point.name} ${point.address || point.area} 泉州`);
      return `https://www.amap.com/search?query=${q}`;
    };

    const googleSearch = (point) => {
      const q = encodeURIComponent(`${point.name} ${point.address || point.area} 泉州`);
      return `https://www.google.com/maps/search/?api=1&query=${q}`;
    };

    const byCategory = (category) => categories[category] || categories["待确认"];
    const hasCoord = (p) => typeof p.lat === "number" && typeof p.lng === "number";
    const isExact = (p) => ["坐标级", "地址级"].includes(p.precision);

    document.getElementById("totalCount").textContent = points.length;
    document.getElementById("mappedCount").textContent = points.filter(hasCoord).length;
    document.getElementById("exactCount").textContent = points.filter((p) => hasCoord(p) && isExact(p)).length;

    const map = L.map("map", { scrollWheelZoom: true }).setView([24.91, 118.59], 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const markers = new Map();

    function markerIcon(color) {
      return L.divIcon({
        className: "",
        html: `<div class="pin" style="background:${color}"><span></span></div>`,
        iconSize: [24, 24],
        iconAnchor: [12, 22],
        popupAnchor: [0, -20]
      });
    }

    points.forEach((point) => {
      if (!hasCoord(point)) return;
      const marker = L.marker([point.lat, point.lng], { icon: markerIcon(byCategory(point.category)) });
      marker.bindPopup(`
        <div class="popup">
          <h3>${point.name}</h3>
          <p><b>${point.category}</b> · ${point.area} · ${point.precision}</p>
          <p>${point.address}</p>
          <p>${point.note}</p>
          <p><a href="${amapSearch(point)}" target="_blank" rel="noreferrer">高德搜索</a> · <a href="${googleSearch(point)}" target="_blank" rel="noreferrer">Google Maps</a></p>
        </div>
      `);
      marker.addTo(markerLayer);
      markers.set(point.name, marker);
    });

    const plotted = points.filter(hasCoord).map((p) => [p.lat, p.lng]);
    if (plotted.length) {
      map.fitBounds(plotted, { padding: [28, 28] });
    }

    const legend = L.control({ position: "bottomright" });
    legend.onAdd = () => {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = Object.entries(categories)
        .map(([name, color]) => `<div class="legend-row"><span class="legend-dot" style="background:${color}"></span>${name}</div>`)
        .join("");
      return div;
    };
    legend.addTo(map);

    const filters = document.getElementById("filters");
    const list = document.getElementById("list");
    const search = document.getElementById("search");
    let activeCategory = "全部";

    ["全部", ...Object.keys(categories)].forEach((category) => {
      const button = document.createElement("button");
      button.textContent = category;
      button.className = category === activeCategory ? "active" : "";
      button.addEventListener("click", () => {
        activeCategory = category;
        [...filters.children].forEach((child) => child.classList.toggle("active", child.textContent === category));
        render();
      });
      filters.appendChild(button);
    });

    function visiblePoints() {
      const keyword = search.value.trim().toLowerCase();
      return points.filter((point) => {
        const inCategory = activeCategory === "全部" || point.category === activeCategory;
        const haystack = `${point.name} ${point.category} ${point.area} ${point.address} ${point.note} ${point.priority}`.toLowerCase();
        return inCategory && (!keyword || haystack.includes(keyword));
      });
    }

    function render() {
      const rows = visiblePoints();
      markerLayer.clearLayers();
      rows.forEach((point) => {
        const marker = markers.get(point.name);
        if (marker) marker.addTo(markerLayer);
      });

      list.innerHTML = rows.map((point) => `
        <article class="item">
          <span class="dot" style="background:${byCategory(point.category)}"></span>
          <div>
            <h2>${point.name}</h2>
            <div class="meta">${point.category} · ${point.area} · ${point.precision} · ${point.priority}</div>
            <div class="note">${point.address}</div>
            <div class="note">${point.note}</div>
            <div class="links">
              ${hasCoord(point) ? `<a href="#" data-focus="${point.name}">地图定位</a>` : `<span>未上图</span>`}
              <a href="${amapSearch(point)}" target="_blank" rel="noreferrer">高德搜索</a>
              <a href="${googleSearch(point)}" target="_blank" rel="noreferrer">Google Maps</a>
            </div>
          </div>
        </article>
      `).join("");
    }

    list.addEventListener("click", (event) => {
      const target = event.target.closest("[data-focus]");
      if (!target) return;
      event.preventDefault();
      const marker = markers.get(target.dataset.focus);
      if (!marker) return;
      const point = marker.getLatLng();
      map.setView(point, 16);
      marker.openPopup();
    });

    search.addEventListener("input", render);
    render();
  </script>
</body>
</html>
