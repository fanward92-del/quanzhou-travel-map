<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>泉州旅行地图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --ink: #1f2933;
      --muted: #667085;
      --line: #ded8ce;
      --card: #fffdf8;
      --accent: #0f766e;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    main {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(30px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      max-width: 680px;
      margin: 0 0 30px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.7;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--card);
      box-shadow: 0 14px 34px rgba(46, 40, 32, .12);
    }

    h2 {
      margin: 0 0 10px;
      font-size: 24px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    a.button {
      align-self: flex-start;
      margin-top: 22px;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--accent);
      color: white;
      text-decoration: none;
      font-weight: 600;
      line-height: 1;
    }

    .note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 720px) {
      main { padding: 34px 0; }
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 190px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>泉州旅行地图</h1>
    <p class="lead">这里放了两张互动地图：一张看三晚三天的游玩路线，一张看泉州美食点位。打开后可以筛选、搜索，也可以点地图上的标记看说明。</p>
    <section class="grid">
      <article class="card">
        <div>
          <h2>行程路线图</h2>
          <p>周三晚到泉州，周四古城，周五石狮海岸线，周六洛阳桥返程。路线按天分色画线。</p>
        </div>
        <a class="button" href="./trip.html">打开路线图</a>
      </article>
      <article class="card">
        <div>
          <h2>美食点位图</h2>
          <p>整理了面线糊、牛肉、姜母鸭、醋肉、甜品、海鲜和石狮晋江小吃点位。</p>
        </div>
        <a class="button" href="./food.html">打开美食图</a>
      </article>
    </section>
    <p class="note">地图底图来自 OpenStreetMap，出发当天仍建议用高德或其他导航软件确认实时交通、营业状态和天气。</p>
  </main>
</body>
</html>
