<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>泉州路线 + 美食安排</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: #fffdf8;
      --ink: #1f2933;
      --muted: #667085;
      --line: #ded8ce;
      --accent: #0f766e;
      --food: #dc2626;
      --sight: #2563eb;
      --shadow: 0 14px 34px rgba(46, 40, 32, .16);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    .app {
      display: grid;
      grid-template-columns: minmax(380px, 500px) minmax(0, 1fr);
      height: 100dvh;
    }

    aside {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      z-index: 500;
    }

    header {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--line);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .verdict {
      margin-top: 14px;
      padding: 10px 12px;
      border: 1px solid #b7d8ce;
      border-radius: 8px;
      background: #eef8f5;
      color: #10594f;
      font-size: 13px;
      line-height: 1.5;
    }

    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--line);
    }

    button {
      appearance: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: white;
      color: var(--ink);
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      line-height: 1;
    }

    button.active {
      color: white;
      background: var(--accent);
      border-color: var(--accent);
    }

    .panel {
      min-height: 0;
      overflow: auto;
      padding: 14px 18px 20px;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .summary {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .block {
      padding: 13px 0;
      border-bottom: 1px solid #ece5d8;
    }

    .block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }

    .meal {
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .time {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    h3 {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .route {
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .note {
      margin-top: 7px;
      font-size: 13px;
      line-height: 1.55;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .tag {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      background: white;
      color: var(--muted);
      font-size: 12px;
      line-height: 1;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      margin-top: 9px;
      font-size: 12px;
    }

    a {
      color: #0f766e;
      text-decoration: none;
    }

    a:hover { text-decoration: underline; }

    #map {
      min-height: 100dvh;
      background: #e7dfd0;
    }

    .marker {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      color: white;
      border: 2px solid white;
      box-shadow: 0 3px 10px rgba(0,0,0,.28);
      font: 700 12px/1 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .marker span {
      transform: rotate(45deg);
    }

    .food-marker { background: var(--food); }
    .sight-marker { background: var(--sight); }

    .leaflet-popup-content {
      margin: 12px 14px;
      min-width: 220px;
    }

    .popup h3 {
      margin: 0 0 6px;
      font-size: 15px;
    }

    .popup p {
      margin: 5px 0;
      color: #4b5563;
      line-height: 1.45;
    }

    .legend {
      padding: 10px 12px;
      background: rgba(255,255,255,.95);
      border-radius: 8px;
      box-shadow: 0 6px 22px rgba(0,0,0,.16);
      font-size: 12px;
      line-height: 1.55;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      white-space: nowrap;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .leaflet-control-attribution { font-size: 10px; }

    @media (max-width: 900px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 52dvh 48dvh;
      }

      aside {
        grid-row: 2;
        border-right: 0;
        border-top: 1px solid var(--line);
      }

      #map {
        grid-row: 1;
        min-height: 52dvh;
      }

      header { padding: 14px 16px 10px; }
      h1 { font-size: 20px; }
      .tabs { padding: 10px 14px; }
      .panel { padding: 12px 14px 18px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside>
      <header>
        <h1>泉州路线 + 美食安排</h1>
        <p class="subtitle">把必去景点和必吃店合在同一条动线上。古城按步行/短打车排，石狮单独一天，不和古城硬混。</p>
        <div class="verdict">核心建议：周四早餐吃水门国仔，午餐打车去阿秋，下午天后宫后接秉正堂；周五石狮用“小吃拼盘 + 海岸线 + 绿岛海鲜”解决。</div>
      </header>
      <nav class="tabs" id="tabs"></nav>
      <section class="panel" id="panel"></section>
    </aside>
    <section id="map" aria-label="泉州路线美食地图"></section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    const tabs = document.getElementById("tabs");
    const panel = document.getElementById("panel");
    const map = L.map("map", { scrollWheelZoom: true }).setView([24.88, 118.62], 10);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const markerLayer = L.layerGroup().addTo(map);
    const lineLayer = L.layerGroup().addTo(map);
    const markerMap = new Map();
    let active = "thu";

    const amapSearch = (stop) => `https://www.amap.com/search?query=${encodeURIComponent(stop.name + " 泉州")}`;

    function markerIcon(stop) {
      const klass = stop.type === "food" ? "food-marker" : "sight-marker";
      return L.divIcon({
        className: "",
        html: `<div class="marker ${klass}"><span>${stop.n}</span></div>`,
        iconSize: [32, 32],
        iconAnchor: [16, 29],
        popupAnchor: [0, -27]
      });
    }

    function popup(stop) {
      return `
        <div class="popup">
          <h3>${stop.name}</h3>
          <p><b>${stop.meal}</b> · ${stop.time}</p>
          <p>${stop.route}</p>
          <p>${stop.note}</p>
          <p><a href="${amapSearch(stop)}" target="_blank" rel="noreferrer">高德搜索</a></p>
        </div>
      `;
    }

    function dayStops() {
      if (active === "all") return days.flatMap((day) => day.stops.map((stop) => ({ ...stop, dayColor: day.color, dayId: day.id })));
      const day = days.find((item) => item.id === active);
      return day.stops.map((stop) => ({ ...stop, dayColor: day.color, dayId: day.id }));
    }

    function draw() {
      markerLayer.clearLayers();
      lineLayer.clearLayers();
      markerMap.clear();

      const selectedDays = active === "all" ? days : days.filter((day) => day.id === active);
      const bounds = [];

      selectedDays.forEach((day) => {
        const coords = day.stops.filter((stop) => stop.line !== false).map((stop) => [stop.lat, stop.lng]);
        L.polyline(coords, { color: day.color, weight: 4, opacity: .75, dashArray: day.id === "fri" ? "10 7" : null }).addTo(lineLayer);
        day.stops.forEach((stop, index) => {
          const key = `${day.id}-${index}`;
          const marker = L.marker([stop.lat, stop.lng], { icon: markerIcon(stop) }).bindPopup(popup(stop));
          marker.addTo(markerLayer);
          markerMap.set(key, marker);
          bounds.push([stop.lat, stop.lng]);
        });
      });

      if (bounds.length) map.fitBounds(bounds, { padding: [34, 34] });
    }

    function renderPanel() {
      if (active === "all") {
        panel.innerHTML = `
          <h2>总览：按天分开吃，不把石狮塞进古城</h2>
          <p class="summary">古城必吃集中在周三晚和周四；石狮必吃集中在周五。这样最不容易崩，也能把你点名的店都放进去。</p>
          ${days.map((day) => `
            <section class="block">
              <div class="block-head"><span class="meal">${day.label}</span><span class="time">${day.stops.length} 个点</span></div>
              <h3>${day.title}</h3>
              <div class="note">${day.summary}</div>
            </section>
          `).join("")}
        `;
        return;
      }

      const day = days.find((item) => item.id === active);
      panel.innerHTML = `
        <h2>${day.title}</h2>
        <p class="summary">${day.summary}</p>
        ${day.stops.map((stop, index) => `
          <article class="block">
            <div class="block-head">
              <span class="meal">${stop.meal}</span>
              <span class="time">${stop.time}</span>
            </div>
            <h3>${stop.name}</h3>
            <div class="route">${stop.route}</div>
            <div class="note">${stop.note}</div>
            <div class="tags">${stop.tags.map((tag) => `<span class="tag">${tag}</span>`).join("")}</div>
            <div class="links">
              <a href="#" data-focus="${day.id}-${index}">地图定位</a>
              <a href="${amapSearch(stop)}" target="_blank" rel="noreferrer">高德搜索</a>
            </div>
          </article>
        `).join("")}
      `;
    }

    function activate(dayId) {
      active = dayId;
      [...tabs.children].forEach((button) => button.classList.toggle("active", button.dataset.day === dayId));
      draw();
      renderPanel();
    }

    [{ id: "all", label: "总览" }, ...days].forEach((day) => {
      const button = document.createElement("button");
      button.dataset.day = day.id;
      button.textContent = day.label;
      button.className = day.id === active ? "active" : "";
      button.addEventListener("click", () => activate(day.id));
      tabs.appendChild(button);
    });

    panel.addEventListener("click", (event) => {
      const target = event.target.closest("[data-focus]");
      if (!target) return;
      event.preventDefault();
      const marker = markerMap.get(target.dataset.focus);
      if (!marker) return;
      map.setView(marker.getLatLng(), 16);
      marker.openPopup();
    });

    const legend = L.control({ position: "bottomright" });
    legend.onAdd = () => {
      const div = L.DomUtil.create("div", "legend");
      div.innerHTML = `
        <div class="legend-row"><span class="legend-dot" style="background:var(--sight)"></span>景点/交通</div>
        <div class="legend-row"><span class="legend-dot" style="background:var(--food)"></span>吃饭/点心</div>
      `;
      return div;
    };
    legend.addTo(map);

    activate(active);
  </script>
</body>
</html>
